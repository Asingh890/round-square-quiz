<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Round Square Internationalism Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ==========
   PASTE PART 2 CSS HERE
   ========== */

</style>

</head>

<body>

<div class="background-circle circle1"></div>
<div class="background-circle circle2"></div>
<div class="background-circle circle3"></div>

<div class="app">

<!-- ======================
WELCOME SCREEN
======================= -->

<section id="welcomeScreen" class="screen active">

<div class="welcome-card">

<div class="logo">
🌍
</div>

<h1>
Round Square
<br>
Internationalism
</h1>

<p class="subtitle">

Explore cultures.
Celebrate diversity.
Become a global citizen.

</p>

<div class="input-group">

<input
type="text"
id="playerName"
placeholder="Enter Explorer Name">

</div>

<button id="startBtn" class="primary-btn">
Start Journey →
</button>

</div>

</section>

<!-- ======================
QUIZ SCREEN
======================= -->

<section id="quizScreen" class="screen">

<header class="top-bar">

<div class="timer-box">

<div class="timer-circle">

<svg width="70" height="70">

<circle
class="timer-bg"
cx="35"
cy="35"
r="30">
</circle>

<circle
class="timer-progress"
cx="35"
cy="35"
r="30">
</circle>

</svg>

<span id="timer">
15
</span>

</div>

</div>

<div class="score-box">

<div class="score-title">
Score
</div>

<div id="score">
0 XP
</div>

</div>

</header>

<div class="progress-wrapper">

<div id="progressBar">

</div>

</div>

<div class="question-card">

<div class="question-number">

Question

<span id="questionCount">
1
</span>

/5

</div>

<h2 id="question">

Question goes here

</h2>

<div id="options" class="options">

</div>

<div
id="explanation"
class="explanation">

</div>

<button
id="nextBtn"
class="primary-btn hidden">

Next Stop →

</button>

</div>

</section>

<!-- ======================
RESULTS
======================= -->

<section id="resultScreen" class="screen">

<canvas id="confettiCanvas">

</canvas>

<div class="result-card">

<div class="result-icon">

🏆

</div>

<h1>

Journey Complete!

</h1>

<h2 id="playerGreeting">

Explorer

</h2>

<div class="final-score">

<div class="score-label">

Final Score

</div>

<div id="finalScore">

0 XP

</div>

</div>

<div id="performanceText">

Amazing!

</div>

<div id="stats">

</div>

<button
id="restartBtn"
class="primary-btn">

Restart Quiz

</button>

</div>

</section>

</div>

<script>

/* ==========
PASTE PART 3 JAVASCRIPT HERE
========== */

</script>

</body>
</html>
